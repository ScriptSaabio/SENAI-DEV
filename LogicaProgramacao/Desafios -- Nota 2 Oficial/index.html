<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Estoque</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <h1>📦 Gestão de Estoque</h1>

    <fieldset>
        <legend>Filtros</legend>

        <div class="linha">
            <label>Rotatividade:</label>
            <select id="rotatividade">
                <option value="">Todos</option>
                <option value="alta">Alta</option>
                <option value="media">Média</option>
                <option value="baixa">Baixa</option>
            </select>
        </div>

        <div class="linha">
            <label>Curva ABC:</label>
            <select id="curva">
                <option value="">Todos</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select>
        </div>

        <div class="botoes">
            <button onclick="listarTodos()">Listar Todos</button>
            <button onclick="filtrar()">Filtrar</button>
            <button onclick="verReposicao()">Reposição</button>
            <button onclick="valorTotal()">Valor Total</button>
        </div>
    </fieldset>

    <fieldset>
        <legend>Produtos</legend>
        <div class="table-container">
            <table id="tabelaProdutos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço Compra</th>
                        <th>Preço Venda</th>
                        <th>Estoque</th>
                        <th>Rotatividade</th>
                        <th>Curva</th>
                    </tr>
                </thead>
                <tbody id="lista">
                    <!-- JS vai preencher aqui -->
                </tbody>
            </table>
        </div>

    </fieldset>

    <fieldset>
        <legend>Adicionar Produto</legend>

        <div class="form">
            <input id="nome" placeholder="Nome">
            <input id="precoCompra" type="number" placeholder="Preço Compra">
            <input id="precoVenda" type="number" placeholder="Preço Venda">
            <input id="quantidade" type="number" placeholder="Quantidade">

            <select id="rot">
                <option value="alta">Alta</option>
                <option value="media">Média</option>
                <option value="baixa">Baixa</option>
            </select>

            <select id="cur">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select>

            <button onclick="adicionar()">Adicionar</button>
        </div>
    </fieldset>

    <script src="./exercicios.js" type="module"></script>

</body>

</html>
