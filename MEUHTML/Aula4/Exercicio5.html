    <style>
        /* li {

        table {
            border: 1px solid black;
        }

        tr {
            border: 1px solid black;
        }

        th {
            border: 1px solid black;
        }

        td {
            border: 1px solid black;

<body>

    <h1>Cadastro de Alunos</h1>
    <p>Este é um <strong>exercício prático</strong> paa treinar HTML. <br> Aqui você vai usar títulos, parágrafos, listas e tabelas.</p>
    <!-- <p>Lista Ordenada com ul e li</p> -->

    <h1>Lista de Matérias</h1>
    <ul >
        <li>Matemática</li>
        <li>Português</li>
        <li>Ciências</li>
    </ul>
    <h1>Tabela de Alunos</h1>

    <table>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Telefone</th>
        </tr>
        <tr>
            <td>Ana</td>
            <td>20</td>
            <td>(11) 99999-1111</td>
        </tr>
        <tr>
            <td>Carlos</td>
            <td>22</td>
            <td>(11) 98888-2222</td>
        </tr>
    </table>
