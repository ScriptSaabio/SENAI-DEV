<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fiamma</title>
    <link rel="stylesheet" href="style.css">

    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />



</head>

<body>

    <header class="header">

        <div class="logo">
            La <span>Fiamma</span>
        </div>

        <nav class="menu">
            <a class="active" href="#">Inicio</a>
            <a href="#">Cardápio</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>

        <div class="menu">
            <span class="material-symbols-outlined">
                shopping_cart
            </span>
        </div>

    </header>

    <main>
        <h1 style="text-align:center;margin:150px 0;">Conteúdo da página</h1>
    </main>

    <footer class="footer">

        <div class="footer-container">

            <div class="contato">

                <h2>Contato</h2>

                <p><i class="material-symbols-outlined">location_on</i> Rua da Pizza, 125 - Centro São Paulo</p>

                <p><i class="material-symbols-outlined">phone_enabled</i> (11) 99999-9999</p>

                <p><i class="material-symbols-outlined">mail</i> laFiamma@gmail.com</p>

            </div>


            <div class="horario">

                <h2>Horário</h2>

                <p><i class="material-symbols-outlined">schedule</i> Terça a Domingo</p>
                <span>18:00 às 23:00</span>

                <p><i class="material-symbols-outlined">schedule</i> Segunda-feira</p>
                <span>Fechado</span>

            </div>

        </div>

    </footer>

</body>

</html>
